services:
  appflowy_web:
    environment:
      - APPFLOWY_BASE_URL=${APPFLOWY_BASE_URL}
      - APPFLOWY_GOTRUE_BASE_URL=${APPFLOWY_BASE_URL}/gotrue
      - APPFLOWY_WS_BASE_URL=${APPFLOWY_WEBSOCKET_BASE_URL}
      - APPFLOWY_WEBSOCKET_BASE_URL=${APPFLOWY_WEBSOCKET_BASE_URL}
      - AF_BASE_URL=${APPFLOWY_BASE_URL}
      - AF_GOTRUE_URL=${APPFLOWY_BASE_URL}/gotrue
      - AF_WS_V2_URL=${APPFLOWY_WEBSOCKET_BASE_URL}

  ai:
    profiles:
      - optional-ai
    environment:
      - JWT_SECRET=${GOTRUE_JWT_SECRET}
