name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev,mcp]'
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy src tests
      - run: python -m pytest
